    technique_id: T1110
    technique_name: Brute Force — Failed Logon
    tactic: credential-access
    confidence: medium
    conditions:
      event_id: "4625"

  - id: T1003-MIMIKATZ
    technique_id: T1003.001
    technique_name: OS Credential Dumping — LSASS (mimikatz)
    tactic: credential-access
    confidence: high
    conditions:
      event_id: "4688"
      process_contains: "mimikatz"

  - id: T1003-PROCDUMP
