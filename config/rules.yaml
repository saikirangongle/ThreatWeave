# ThreatWeave — Windows MITRE ATT&CK Detection Rules
# Each rule maps a Windows Event ID (and optional conditions) to a technique.
# Conditions are ANDed. Supported keys:
#   event_id         : exact match on EventID string
#   process_contains : substring in process_name OR raw_message (case-insensitive)
#   message_contains : substring in raw_message (case-insensitive)
#   username_contains: substring in username field (case-insensitive)

rules:

  # ── Initial Access ──────────────────────────────────────────────────────
  - id: T1078-LOGON-SUCCESS
    technique_id: T1078
    technique_name: Valid Accounts — Successful Logon
    tactic: initial-access
    confidence: medium
    conditions:
      event_id: "4624"

  - id: T1078-LOGON-EXPLICIT
    technique_id: T1078
    technique_name: Valid Accounts — Explicit Credentials
    tactic: initial-access
    confidence: medium
    conditions:
      event_id: "4648"

  # ── Credential Access ───────────────────────────────────────────────────
